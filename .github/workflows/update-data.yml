name: Update dataset

on:
  schedule:
    # Daily at 06:17 UTC — ages announced shutdowns into the graveyard and
    # harvests new shutdown candidates from Wikipedia for review.
    - cron: '17 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run updater
        run: node scripts/update-dataset.mjs
      - name: Commit & push if changed
        run: |
          git config user.name "killswitch-data-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data; then
            git add data
            git commit -m "data: automated daily update (aging + candidate harvest)"
            git push
          else
            echo "No dataset changes today."
          fi
